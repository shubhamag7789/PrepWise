<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>PrepWise — AI-Powered Interview & Placement Prep</title>
    <meta name="description" content="PrepWise helps you ace technical interviews and placements with AI-powered mock interviews, practice problems, and real-time feedback." />
    <meta name="keywords" content="interview preparation, placement prep, AI mock interview, coding practice, PrepWise" />
    <meta name="author" content="PrepWise" />

    <!-- Open Graph -->
    <meta property="og:title" content="PrepWise — AI-Powered Interview Prep" />
    <meta property="og:description" content="Ace your next interview with AI-powered mock interviews and personalized feedback." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://prepwise.app" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Theme script — runs before React to prevent FOUC -->
    <script>
      (function () {
        const saved = localStorage.getItem('prepwise-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
